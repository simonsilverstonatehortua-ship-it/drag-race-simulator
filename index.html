<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drag Race Simulator — Base de reglas</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="marquee">
  <h1 class="marquee__title">Tu Drag Race Simulator</h1>
  <p class="marquee__subtitle">Base de datos de reglas · retos · formatos</p>
  <div class="toolbar">
    <button id="btn-export" class="btn btn--ghost">Exportar JSON</button>
    <label class="btn btn--ghost" style="cursor:pointer;">
      Importar JSON
      <input id="file-import" type="file" accept="application/json" style="display:none;" />
    </label>
    <button id="btn-reset" class="btn btn--ghost btn--danger">Restablecer catálogos</button>
  </div>
</header>

<nav id="tabs"></nav>

<main>
  <div id="panel"></div>
</main>

<footer>
  Base de reglas/retos/formatos + motor de simulación.
</footer>

<div id="modal-overlay"></div>

<script src="js/data/statuses.js"></script>
<script src="js/data/challenges.js"></script>
<script src="js/data/formats.js"></script>
<script src="js/data/roster.js"></script>
<script src="js/store.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
